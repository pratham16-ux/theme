<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Login | STACKLY</title>

  <link rel="stylesheet" href="login.css">
</head>

<body>

  <div class="login-page">

    <div class="mobile-brand">
      <a href="index.html" class="logo">
    <img src="https://snabsolutions.in/wp-content/uploads/2026/02/stackly-snab-solutions.png" alt="Stackly Logo">
  </a>


      <p>
        Smart IT Solutions for Modern Businesses
      </p>

    </div>

    <div class="login-card">

      <div class="login-image">

        <div class="image-overlay">

          <h2>Welcome Back</h2>

          <p>
            Securely login and manage your business services with Stackly.
          </p>

        </div>

      </div>

      <div class="login-content">

        <div class="login-header">

          <h2>Login</h2>

          <p>
            Enter your details to continue
          </p>

        </div>

        <form action="404.html">


          <div class="input-group">

            <label>Email Address</label>

            <input
              type="email"
              placeholder="Enter your email"
              required
            >

          </div>

          <div class="input-group">

            <label>Password</label>

            <input
              type="password"
              placeholder="Enter your password"
              required
            >

          </div>

          <div class="remember-box">

            <label class="checkbox">

              <input type="checkbox">

              Remember Me

            </label>

            <a href="404.html">
              Forgot Password?
            </a>

          </div>


          <button type="submit">
            Login
          </button>

          <div class="divider">
            <span>OR</span>
          </div>

          

          <div class="signup-text">

            Don't have an account?

            <a href="404.html">
              Create Account
            </a>

          </div>

          
          <center>

            <a href="index.html" class="back-home">
              Back to Home
            </a>

          </center>

        </form>

      </div>

    </div>

  </div>

</body>
</html>
